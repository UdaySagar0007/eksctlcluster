# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1
#spot instance
managedNodeGroups:
- name: spot
  instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"]
  # AWS Free tier
  #instanceTypes: ["m7i-flex.large","c7i-flex.large","t3.small"]
  spot: true
  desiredCapacity: 2

  # On Demand instance
#managedNodeGroups:
#- name: ondemand
 # instanceTypes: ["t3.medium"]
  # AWS Free tier
  #instanceTypes: ["m7i-flex.large","c7i-flex.large","t3.small"]
  #spot: false
  #desiredCapacity: 2
